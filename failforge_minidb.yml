# FailForge test configuration for Mini-Redis-Cassandra
name: mini-redis-cassandra-test
seed: 42

time:
  duration_ms: 10000
  tick_ms: 10

system:
  type: process_cluster
  nodes:
    count: 3
    command: "PYTHONPATH=/home/yumekaz/Desktop/Mini-Redis-Cassandra NODE_ID={node_id} PROXY_PORT=9000 START_PORT=7001 python3 -m minidb.main --node-id {node_id} --port {port} --cluster-port $(( {port} + 1000 )) --peers localhost:8001,localhost:8002,localhost:8003 --data-dir .failforge/data/{run_id}/{node_id} --consistency QUORUM"
    ports:
      start: 7001
    data_dir: ".failforge/data/{run_id}/{node_id}"

network:
  mode: controlled_proxy
  proxy_port: 9000

workload:
  type: mini-redis-cassandra
  clients: 3
  duration_ms: 8000
  keys: [x, y, z]
  operations:
    put:
      weight: 5
    get:
      weight: 5

faults:
  mode: seeded_random
  profile:
    max_faults: 3
    kill_node:
      weight: 1
    restart_node:
      weight: 1
    partition:
      weight: 2

checkers:
  - name: read_after_acknowledged_write
  - name: no_two_leaders

output:
  dir: "runs/minidb-{seed}"
